workflows:
  android-workflow:
    name: Build Android APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    scripts:
      - name: Recreate Flutter structure safely
        script: |
          mkdir temp_lib
          cp -r lib/* temp_lib/
          cp pubspec.yaml temp_pubspec.yaml

          flutter create . --project-name=vapor_manager --overwrite --platforms=android

          # 1. Muda o Nome do App
          sed -i '' 's/android:label=".*"/android:label="Vapor Manager"/' android/app/src/main/AndroidManifest.xml
          
          # 2. Injeta a Permissão de Biometria no Android
          sed -i '' 's/<application/<uses-permission android:name="android.permission.USE_BIOMETRIC"\/>\n    <application/' android/app/src/main/AndroidManifest.xml
          
          # 3. Transforma a atividade do Android para aceitar Biometria
          sed -i '' 's/FlutterActivity/FlutterFragmentActivity/g' android/app/src/main/kotlin/com/example/vapor_manager/MainActivity.kt

          rm -rf lib/*
          cp -r temp_lib/* lib/
          cp temp_pubspec.yaml pubspec.yaml
      - name: Get Flutter dependencies
        script: |
          flutter packages pub get
      - name: Generate App Icon
        script: |
          flutter pub run flutter_launcher_icons
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - seu-email@aqui.com
