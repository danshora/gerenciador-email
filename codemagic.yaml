workflows:
  android-workflow:
    name: Build Android APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    scripts:
      - name: Recreate Flutter project structure
        script: |
          # Cria a estrutura necessária que o Dreamflow não exportou
          flutter create . --project-name=vaporwave_journey --overwrite --platforms=android
      - name: Get Flutter dependencies
        script: |
          flutter packages pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - seu-email@aqui.com
