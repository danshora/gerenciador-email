name: vapor_manager
description: "Entre na atmosfera vaporwave com um gerenciador de contas que não só organiza seus logins e senhas, mas também adiciona um toque neon dos anos 80 à sua vida digital."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  uuid: ^4.0.0
  shared_preferences: ^2.0.0
  local_auth: ^2.2.0
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.3
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icone.png"
  remove_alpha_ios: true
